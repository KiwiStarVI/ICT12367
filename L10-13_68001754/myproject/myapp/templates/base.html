<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

    .btn-pink { background-color: #ff69b4 !important; color: white !important; }
    .btn-orange { background-color: #ff8c00 !important; color: white !important; }
    .btn-pink:hover, .btn-orange:hover { opacity: 0.8; color: white; }

    .banner-image {
        background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                          url('https://mcdn.wallpapersafari.com/medium/8/77/Fb2kGf.jpg'); 
        
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        min-height: 150px; 
        
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    </style>
</head>
<body>
    <div class="container mt-3">
        <div class="banner-image d-flex align-items-center mb-4 text-white">
            <div class="p-4 w-100 d-flex justify-content-between align-items-center">
                <a class="navbar-brand text-white fw-bold fs-3 text-decoration-none" href="{% url 'index' %}">
                    <i class="fas fa-users-cog me-2"></i> ระบบจัดการประชากร
                </a>
                <div class="navbar-nav d-flex flex-row gap-3">
                    <a class="nav-link text-white active" href="{% url 'index' %}">หน้าแรก</a>
                    <a class="nav-link text-white" href="{% url 'form' %}">ลงทะเบียน</a>
                </div>
            </div>
        </div>

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
