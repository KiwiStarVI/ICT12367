{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">ระบบจัดการประชากร</h2>
        <a href="{% url 'form' %}" class="btn btn-primary">ไปหน้าลงทะเบียน</a>
    </div>

    <div class="row mb-3 justify-content-end">
        <div class="col-md-4">
            <form action="" method="GET" class="d-flex">
                <input class="form-control me-2" type="search" name="q" placeholder="ค้นหาชื่อ..." value="{{ request.GET.q }}">
                <button class="btn btn-outline-primary" type="submit">ค้นหา</button>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-bordered table-hover mb-0">
                <thead class="table-dark text-center">
                    <tr>
                        <th>ลำดับ</th>
                        <th>ชื่อ-นามสกุล</th>
                        <th>อายุ</th>
                        <th>แผนก</th>
                        <th>การจัดการ</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in all_person %}
                    <tr class="text-center align-middle">
                        <td>{{ forloop.counter }}</td>
                        <td class="text-start">{{ p.name }}</td>
                        <td>{{ p.age }}</td>
                        <td>{{ p.department.name|default:"-" }}</td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <a href="{% url 'edit' p.id %}" class="btn btn-warning btn-sm">แก้ไข</a>
                                <a href="{% url 'delete' p.id %}" class="btn btn-danger btn-sm" onclick="return confirm('ลบข้อมูล?')">ลบ</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="5" class="text-center p-3">ไม่พบข้อมูล</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
