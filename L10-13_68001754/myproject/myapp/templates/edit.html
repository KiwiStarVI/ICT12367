{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow border-warning">
        <div class="card-header bg-warning text-dark fw-bold">
            <i class="fas fa-edit me-2"></i> แก้ไขข้อมูลประชากร
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
<div class="mb-3">
    <label class="form-label">ชื่อ-นามสกุล</label>
    <input type="text" class="form-control" name="name" value="{{ person.name }}" required>
</div>

<div class="mb-3">
    <label class="form-label">อายุ</label>
    <input type="number" class="form-control" name="age" value="{{ person.age }}" required>
</div>

<div class="mb-3">
    <label class="form-label text-success fw-bold">แผนก/ฝ่าย</label>
    <select name="department" class="form-select border-success" required>
        <option value="">-- เลือกแผนก --</option>
        {% for d in all_dept %}
            <option value="{{ d.id }}" {% if d.id == person.department.id %} selected {% endif %}>
                {{ d.name }}
            </option>
        {% endfor %}
    </select>
    <div class="form-text">สามารถเปลี่ยนแผนกของประชากรได้ที่นี่</div>
</div>

<div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">บันทึกการแก้ไข</button>
    <a href="{% url 'index' %}" class="btn btn-secondary">ยกเลิก</a>
</div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
